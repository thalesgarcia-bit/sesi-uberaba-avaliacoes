
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESI Avaliações</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f6fa;margin:0;padding:40px}
.container{max-width:500px;margin:auto;background:white;padding:30px;border-radius:8px}
input{width:100%;padding:10px;margin:8px 0}
button{padding:10px 16px;background:#1a3a6b;color:white;border:none;border-radius:4px}
.admin{display:none}
</style>
</head>

<body>

<div class="container" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="email institucional">
<input id="senha" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>
</div>

<div class="container admin" id="adminBox">
<h2>Painel ADMIN</h2>
<p>Solicitações pendentes:</p>
<div id="pendentes"></div>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyANfUkmlNDLfLtunVRqiHJsgllIEsKG2PA",
authDomain: "sesi-avaliacoes.firebaseapp.com",
projectId: "sesi-avaliacoes",
storageBucket: "sesi-avaliacoes.appspot.com",
messagingSenderId: "254340388680",
appId: "1:254340388680:web:ab877b0fae4ae42666857d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

async function login(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

if(!email.endsWith("@fiemg.com.br")){
alert("Use seu email institucional.");
return;
}

try{

const cred = await auth.signInWithEmailAndPassword(email,senha);

const uid = cred.user.uid;

const doc = await db.collection("usuarios").doc(uid).get();

if(!doc.exists){
alert("Usuário não autorizado.");
return;
}

const data = doc.data();

if(data.role==="admin"){
abrirAdmin();
}

}catch(e){
alert(e.message)
}

}

async function abrirAdmin(){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminBox").style.display="block";

const snap = await db.collection("usuarios").where("status","==","pendente").get();

const box = document.getElementById("pendentes");

snap.forEach(doc=>{

const d = doc.data();

const div = document.createElement("div");
div.innerHTML = d.email + " <button onclick='aprovar(""+doc.id+"")'>aprovar</button>";

box.appendChild(div);

});

}

async function aprovar(id){

await db.collection("usuarios").doc(id).update({
status:"ativo"
});

alert("usuário aprovado");
location.reload();

}

</script>

</body>
</html>
