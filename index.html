<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SESI Avaliações V4.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f6fa;margin:0;padding:0}
.container{max-width:500px;margin:80px auto;background:white;padding:30px;border-radius:10px;text-align:center}
input,select{width:100%;padding:10px;margin:8px 0}
button{padding:10px 16px;background:#0b3d91;color:white;border:none;border-radius:6px;cursor:pointer}
.hidden{display:none}
.editor{max-width:900px;margin:30px auto;background:white;padding:30px;border-radius:10px}
.questao{margin-top:20px}
</style>
</head>

<body>

<div id="login" class="container">
<img src="logo.png" style="width:160px">
<h2>Login</h2>
<input id="email" placeholder="email institucional">
<input id="senha" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>
</div>

<div id="app" class="hidden">

<div class="editor">
<h2>Nova Avaliação</h2>

<select id="segmento" onchange="carregarTurmas()">
<option value="">Segmento</option>
<option>Ensino Fundamental</option>
<option>Ensino Médio</option>
</select>

<select id="turma">
<option>Selecione o segmento</option>
</select>

<input id="data" placeholder="__/__/2026">

<button onclick="addQuestao()">Adicionar Questão</button>

<div id="questoes"></div>

<button onclick="exportWord()">Exportar Word</button>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyANfUkmlNDLfLtunVRqiHJsgllIEsKG2PA",
authDomain: "sesi-avaliacoes.firebaseapp.com",
projectId: "sesi-avaliacoes"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
let email=document.getElementById("email").value;
let senha=document.getElementById("senha").value;

auth.signInWithEmailAndPassword(email,senha)
.then(()=>{
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
})
.catch(e=>alert("Erro: "+e.message));
}

function carregarTurmas(){
let seg=document.getElementById("segmento").value;
let turma=document.getElementById("turma");

turma.innerHTML="";

if(!seg){
turma.innerHTML="<option>Selecione o segmento</option>";
return;
}

let lista = seg==="Ensino Fundamental" ?
["6º Ano","7º Ano","8º Ano","9º Ano"] :
["1º Ano EM","2º Ano EM","3º Ano EM"];

lista.forEach(t=>{
let op=document.createElement("option");
op.text=t;
turma.appendChild(op);
});
}

function addQuestao(){
let q=document.createElement("div");
q.className="questao";
q.innerHTML=`
<b>QUESTÃO</b>
<textarea placeholder="Enunciado"></textarea>
<input placeholder="A)">
<input placeholder="B)">
<input placeholder="C)">
<input placeholder="D)">
<button onclick="this.parentElement.remove()">Excluir</button>
`;
document.getElementById("questoes").appendChild(q);
}

function exportWord(){
let nome="AVALIACAO-2026";
let conteudo=document.getElementById("questoes").innerHTML;

let blob=new Blob(['<html><body>'+conteudo+'</body></html>'],{type:'application/msword'});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=nome+".doc";
a.click();
}

</script>

</body>
</html>
