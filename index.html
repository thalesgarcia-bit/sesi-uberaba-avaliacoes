<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SESI Editor Final v1</title>
<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f5f5}
.toolbar{background:#fff;padding:10px;border:1px solid #ccc;margin-bottom:10px}
.editor{background:#fff;padding:20px;border:1px solid #ccc;min-height:500px}
button{margin-right:5px}
</style>
</head>
<body>

<div class="toolbar">
<select onchange="document.execCommand('fontName',false,this.value)">
<option>Arial</option>
<option>Calibri</option>
<option>Trebuchet MS</option>
</select>

<button onclick="document.execCommand('bold')"><b>B</b></button>
<button onclick="document.execCommand('italic')"><i>I</i></button>
<button onclick="document.execCommand('underline')"><u>U</u></button>

<button onclick="document.execCommand('justifyLeft')">Esq</button>
<button onclick="document.execCommand('justifyCenter')">Centro</button>
<button onclick="document.execCommand('justifyRight')">Dir</button>
<button onclick="document.execCommand('justifyFull')">Just</button>
</div>

<div class="editor" contenteditable="true">
<h3>QUESTÃO 01 – VALOR: 1,0 PONTOS</h3>
<p>Digite aqui seu enunciado...</p>
<p><b>A)</b> Alternativa</p>
<p><b>B)</b> Alternativa</p>
<p><b>C)</b> Alternativa</p>
<p><b>D)</b> Alternativa</p>
</div>

</body>
</html>
